<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Panel de Control Saber Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-link { transition: all 0.3s ease; }
        .nav-link:hover { transform: translateX(5px); }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-2xl">
        <div class="h-16 flex items-center justify-center border-b border-slate-800">
            <h2 class="text-2xl font-bold tracking-wider text-blue-400">SaberPro<span class="text-white">Web</span></h2>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a th:href="@{/}" class="nav-link flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-lg shadow-md">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Dashboard
            </a>
            <a th:href="@{/estudiantes}" class="nav-link flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Estudiantes
            </a>
            <a th:href="@{/coordinador/informes}" class="nav-link flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg">
			    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
			        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path>
			    </svg>
			    Beneficios
			</a>
        </nav>
        
        @{/coordinador/informes

        <div class="p-4 border-t border-slate-800">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="w-full text-left px-4 py-3 text-red-400 hover:bg-red-900 hover:text-white rounded-lg transition-colors">
                    Cerrar Sesión
                </button>
            </form>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
            <h1 class="text-xl font-bold text-slate-700" th:text="${titulo}">Dashboard</h1>
            <div class="flex items-center gap-3">
                <span class="text-sm font-semibold text-slate-600">Usuario</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 bg-slate-100">
            <div th:if="${exito}" class="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-3 rounded-lg mb-6 shadow-sm" th:text="${exito}"></div>
            <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 shadow-sm" th:text="${error}"></div>
            
            <div class="bg-white rounded-xl p-6 border border-slate-200 shadow-sm md:col-span-2 flex flex-col justify-center">
                    <h3 class="text-sm font-semibold text-slate-500 mb-3">Importar Resultados (Formato CSV)</h3>
                    
                    <form th:action="@{/importar}" method="post" enctype="multipart/form-data" class="flex flex-col sm:flex-row items-center gap-4">
                        <div class="flex-1 w-full">
                            <input type="file" name="archivo" accept=".csv" required 
                               class="block w-full text-sm text-slate-600 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 transition-colors cursor-pointer border border-slate-200 rounded-lg bg-slate-50">
                        </div>
                        <button type="submit" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 px-6 rounded-lg transition-colors shadow-sm flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                            Subir Archivo
                        </button>
                    </form>
                </div>

            </div>

            
                
                
            </div>
            
            
            </main>
            
            
    </div>
</body>
</html>
