<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación de Beneficios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900 flex h-screen overflow-hidden">

    <div class="flex-1 flex flex-col overflow-hidden w-full">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
            <h1 class="text-xl font-bold text-slate-700">Informe General de Beneficios</h1>
            <a th:href="@{/coordinador/dashboard}" class="bg-slate-600 hover:bg-slate-700 text-white py-2 px-4 rounded-lg text-sm font-semibold">Volver</a>
        </header>

        <main class="flex-1 overflow-y-auto p-8 bg-slate-100">
            
            <div class="bg-white rounded-xl p-6 border border-slate-200 shadow-sm mb-6">
                <form th:action="@{/coordinador/informes}" method="get" class="flex gap-4">
                    <input type="text" name="buscar" th:value="${buscar}" placeholder="Buscar estudiante por nombre o apellido..." 
                           class="flex-1 border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-lg shadow-sm">
                        Buscar
                    </button>
                    <a th:href="@{/coordinador/informes}" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold px-4 py-2.5 rounded-lg flex items-center">
                        Limpiar
                    </a>
                </form>
            </div>

            <div class="bg-white shadow rounded-lg overflow-hidden border border-slate-200">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">Estudiante</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">Documento</th>
                            <th class="px-6 py-3 class= text-left text-xs font-bold text-slate-500 uppercase">Puntaje Global</th>
                            <th class="px-6 py-3 text-center text-xs font-bold text-slate-500 uppercase">Acción</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200">
                        <tr th:each="est : ${estudiantes}">
                            <td class="px-6 py-4 text-sm font-medium text-slate-800" th:text="${(est.primerNombre ?: '') + ' ' + (est.primerApellido ?: '')}"></td>
                            <td class="px-6 py-4 text-sm text-slate-500" th:text="${est.documento}"></td>
                            <td class="px-6 py-4 text-sm font-bold text-blue-600" th:text="${est.resultado?.puntajeGlobal ?: 'Sin evaluar'}"></td>
                            <td class="px-6 py-4 text-center">
                                <a th:href="@{/coordinador/beneficios/{id}(id=${est.id})}" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-4 py-2 rounded-lg shadow-sm transition-colors">
                                    🔎 Ver Beneficio
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(estudiantes)}">
                            <td colspan="4" class="px-6 py-10 text-center text-sm text-slate-400">No se encontraron estudiantes asociados a los criterios de búsqueda.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
