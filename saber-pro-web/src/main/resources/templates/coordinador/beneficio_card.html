<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarjeta de Beneficios del Estudiante</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans antialiased min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        
        <div class="bg-gradient-to-r from-blue-700 to-indigo-800 px-8 py-6 text-white relative">
            <h2 class="text-2xl font-bold tracking-wide" th:text="${estudiante.primerNombre + ' ' + estudiante.primerApellido}">Juan Pérez</h2>
            <p class="text-blue-100 text-sm mt-1" th:text="'Registro Saber Pro: ' + ${estudiante.numeroRegistro}">EK2023000000</p>
            <div class="absolute top-6 right-8 bg-white/20 backdrop-blur-md rounded-full px-4 py-1 text-xs font-bold tracking-wider uppercase">
                Estudiante UTS
            </div>
        </div>

        <div class="p-8 space-y-6">
            
            <div class="grid grid-cols-2 gap-4 text-sm border-b border-slate-100 pb-4">
                <div>
                    <span class="block text-xs font-semibold text-slate-400 uppercase">Documento de Identidad</span>
                    <span class="font-medium text-slate-700" th:text="${estudiante.documento}">12345678</span>
                </div>
                <div>
                    <span class="block text-xs font-semibold text-slate-400 uppercase">Correo Institucional</span>
                    <span class="font-medium text-slate-700 text-ellipsis overflow-hidden block" th:text="${estudiante.correo}">correo@correo.com</span>
                </div>
            </div>

            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Historial de Calificaciones Obtenidas</h3>
                <div class="bg-slate-50 rounded-xl p-4 grid grid-cols-3 gap-4 text-center border border-slate-100">
                    <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                        <span class="block text-xs font-medium text-slate-500">Puntaje Global</span>
                        <span class="text-2xl font-black text-blue-600 mt-1 block" th:text="${estudiante.resultado?.puntajeGlobal ?: 0}">0</span>
                    </div>
                    <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                        <span class="block text-xs font-medium text-slate-500">Lectura Crítica</span>
                        <span class="text-xl font-bold text-slate-700 mt-1 block" th:text="${estudiante.resultado?.puntajeLectura ?: 0}">0</span>
                    </div>
                    <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                        <span class="block text-xs font-medium text-slate-500">Inglés</span>
                        <span class="text-xl font-bold text-slate-700 mt-1 block" th:text="${estudiante.resultado?.puntajeIngles ?: 0}">0</span>
                    </div>
                </div>
            </div>

            <div class="bg-emerald-50 border-2 border-dashed border-emerald-300 rounded-2xl p-6 flex items-start gap-4 shadow-inner">
                <div class="w-12 h-12 bg-emerald-600 text-white rounded-xl flex items-center justify-center shrink-0 shadow-md">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5a2 2 0 10-2 2h2zm0 0h4m-4 0H8m12 3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div>
                    <h4 class="text-sm font-extrabold text-emerald-800 uppercase tracking-wide">Beneficio Académico Asignado</h4>
                    <p class="text-emerald-950 font-medium text-base mt-1 leading-relaxed" th:text="${estudiante.beneficio}">
                        Cargando beneficio del estudiante...
                    </p>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 px-8 py-4 border-t border-slate-100 flex justify-end">
            <a th:href="@{/coordinador/informes}" class="bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2 px-6 rounded-xl text-sm transition-colors shadow-md">
                Volver al Listado
            </a>
        </div>
    </div>

</body>
</html>
