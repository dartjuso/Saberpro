<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Informe Académico - Saber Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8 flex justify-center">
    
    <div class="max-w-4xl w-full">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800">Informe de Alumnos - Saber Pro</h1>
            <a th:href="@{/estudiantes}" class="text-blue-600 font-semibold hover:underline">&larr; Volver al listado</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 text-center">
                <p class="text-slate-500 text-sm font-bold uppercase tracking-wide">Total Evaluados</p>
                <p class="text-4xl font-extrabold text-blue-600 mt-2" th:text="${total}"></p>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-emerald-200 text-center">
                <p class="text-emerald-600 text-sm font-bold uppercase tracking-wide">Aprobados</p>
                <p class="text-4xl font-extrabold text-emerald-600 mt-2" th:text="${aprobados}"></p>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-amber-200 text-center">
                <p class="text-amber-600 text-sm font-bold uppercase tracking-wide">Pendientes / Reprobados</p>
                <p class="text-4xl font-extrabold text-amber-600 mt-2" th:text="${pendientes}"></p>
            </div>
            
            <div class="bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-900 text-center">
                <p class="text-slate-300 text-sm font-bold uppercase tracking-wide">Promedio Global</p>
                <p class="text-4xl font-extrabold text-white mt-2" th:text="${promedio}"></p>
            </div>

        </div>
    </div>

</body>
</html>
