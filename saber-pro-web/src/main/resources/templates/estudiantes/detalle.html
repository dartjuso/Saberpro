<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-slate-100">
        <h2 class="text-3xl font-bold mb-6 text-slate-800" th:text="${estudiante.primerNombre + ' ' + estudiante.primerApellido}"></h2>
        
        <div class="grid grid-cols-2 gap-6">
            <div class="p-4 bg-blue-50 rounded-lg">
                <p class="text-sm text-blue-600 font-semibold">Puntaje Global</p>
                <p class="text-2xl font-bold" th:text="${estudiante.resultado.puntajeGlobal}"></p>
            </div>
            <div class="p-4 bg-emerald-50 rounded-lg">
                <p class="text-sm text-emerald-600 font-semibold">Nivel Inglés</p>
                <p class="text-2xl font-bold" th:text="${estudiante.resultado.nivelIngles}"></p>
            </div>
        </div>
        
        <div class="mt-8">
            <a href="/estudiantes" class="text-slate-500 hover:text-slate-800">&larr; Volver al listado</a>
        </div>
    </div>
</body>
</html>
