<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Gestión de Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900 min-h-screen flex flex-col">

    <header class="h-16 bg-white shadow-sm flex items-center px-8 shrink-0">
        <a th:href="@{/admin/dashboard}" class="text-slate-500 hover:text-blue-600 transition-colors mr-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <h1 class="text-xl font-bold text-slate-800" th:text="${titulo}">Registrar Estudiante</h1>
    </header>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
            
            <div class="w-full md:w-1/3 bg-slate-900 text-white p-8 flex flex-col justify-center">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">Datos del Usuario</h2>
                <p class="text-slate-400 text-sm leading-relaxed">
                    Completa la información requerida para registrar o actualizar los datos del estudiante en la plataforma Saber Pro.
                </p>
            </div>

            <div class="w-full md:w-2/3 p-8 md:p-10">
                <form th:action="@{/admin/usuarios/guardar}" th:object="${estudiante}" method="post" class="space-y-6">
                    
                    <input type="hidden" th:field="*{id}">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Documento de Identidad <span class="text-red-500">*</span></label>
                            <input type="text" th:field="*{documento}" required
                                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Registro Saber Pro</label>
                            <input type="text" th:field="*{numeroRegistro}" placeholder="Ej: EK2026..."
                                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Nombres <span class="text-red-500">*</span></label>
                            <input type="text" th:field="*{primerNombre}" required
                                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Apellidos <span class="text-red-500">*</span></label>
                            <input type="text" th:field="*{primerApellido}" required
                                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Correo Electrónico Institucional</label>
                            <input type="email" th:field="*{correo}"
                                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>
                        
                        <div class="md:col-span-2 bg-blue-50 p-4 rounded-lg border border-blue-100">
                            <label class="block text-sm font-semibold text-blue-800 mb-1">Contraseña de Acceso</label>
                            <p class="text-xs text-blue-600 mb-2">Si dejas este campo en blanco, se asignará "12345" por defecto.</p>
                            <input type="text" th:field="*{password}" placeholder="Escribe para cambiar la contraseña..."
                                   class="w-full px-4 py-2 rounded border border-blue-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="flex items-center justify-end gap-4 pt-4 border-t border-slate-100">
                        <a th:href="@{/estudiantes}" class="px-6 py-2.5 font-semibold text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                            Cancelar
                        </a>
                        <button type="submit" class="px-6 py-2.5 font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-md transition-colors flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                            Guardar Usuario
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </main>
</body>
</html>
