<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Docentes - Saber Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-2xl">
        <div class="h-16 flex items-center justify-center border-b border-slate-800">
            <h2 class="text-2xl font-bold tracking-wider text-blue-400">SaberPro<span class="text-white">Web</span></h2>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a th:href="@{/}" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Dashboard
            </a>
            <a th:href="@{/facultades}" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                Facultades
            </a>
            <a th:href="@{/docentes}" class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-lg transition-colors shadow-md">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Docentes
            </a>
            <a th:href="@{/estudiantes}" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                Estudiantes
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
            <h1 class="text-xl font-bold text-slate-700">Gestión de Docentes</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-8 bg-slate-100">
            
            <div th:if="${exito}" class="bg-emerald-50 text-emerald-700 px-4 py-3 rounded-lg mb-6 shadow-sm border border-emerald-200" th:text="${exito}"></div>
            <div th:if="${error}" class="bg-red-50 text-red-700 px-4 py-3 rounded-lg mb-6 shadow-sm border border-red-200" th:text="${error}"></div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-200">
                        <h2 class="text-lg font-bold text-slate-800">Docentes Registrados</h2>
                    </div>
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">Nombre</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">Correo</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">Facultad</th>
                                <th class="px-6 py-3 text-right text-xs font-bold text-slate-500 uppercase">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-200">
                            <tr th:each="docente : ${docentes}">
                                <td class="px-6 py-4 text-sm font-medium text-slate-800" th:text="${docente.nombre}"></td>
                                <td class="px-6 py-4 text-sm text-slate-500" th:text="${docente.correo}"></td>
                                <td class="px-6 py-4 text-sm text-slate-500">
                                    <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded" 
                                          th:text="${docente.facultad != null ? docente.facultad.nombre : 'Sin asignar'}"></span>
                                </td>
                                <td class="px-6 py-4 text-sm text-right">
                                    
                                </td>
                            </tr>
                            <tr th:if="${docentes.empty}">
                                <td colspan="4" class="px-6 py-8 text-center text-slate-500">No hay docentes registrados.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 h-fit">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">Nuevo Docente</h2>
                    <form th:action="@{/docentes/guardar}" th:object="${nuevoDocente}" method="post">
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-700 mb-1">Nombre Completo</label>
                            <input type="text" th:field="*{nombre}" required 
                                   class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico</label>
                            <input type="email" th:field="*{correo}" required 
                                   class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>

                        <div class="mb-6">
                            <label class="block text-sm font-medium text-slate-700 mb-1">Asignar a Facultad</label>
                            <select th:field="*{facultad}" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <option value="" disabled selected>Seleccione una facultad...</option>
                                <option th:each="facultad : ${facultades}" 
                                        th:value="${facultad.id}" 
                                        th:text="${facultad.nombre}"></option>
                            </select>
                        </div>

                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">
                            Guardar Docente
                        </button>
                    </form>
                </div>

            </div>
        </main>
    </div>
</body>
</html>
