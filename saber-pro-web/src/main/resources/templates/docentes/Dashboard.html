<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Docente - Saber Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <aside class="w-64 bg-slate-900 text-white p-6">
            <h2 class="text-xl font-bold mb-8 text-blue-400">Docente Panel</h2>
            <nav class="space-y-4">
                <a th:href="@{/docentes/dashboard}" class="block py-2 text-white font-bold border-l-4 border-blue-500 pl-4">Dashboard</a>
                <a th:href="@{/docentes/resolucion-beneficios}" class="block py-2 text-gray-400 hover:text-white pl-4">Resolución de Beneficios</a>
            </nav>
            
            <div class="p-4 border-t border-slate-800">
			    <form th:action="@{/logout}" method="post">
			        <button type="submit" class="w-full flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-900/30 hover:text-red-200 rounded-lg transition-colors">
			            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
			                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
			            </svg>
			            Cerrar Sesión
			        </button>
			    </form>
			</div>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">Gestión de Estudiantes</h1>
            </header>

            <div class="bg-white p-6 rounded-lg shadow mb-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <form th:action="@{/docentes/dashboard}" method="get" class="flex gap-2">
                        <input type="text" name="documento" placeholder="Buscar por Cédula..." class="w-full border p-2 rounded">
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Buscar</button>
                    </form>
                    
                    <form th:action="@{/docentes/dashboard}" method="get" class="flex gap-2">
                        <select name="facultadId" class="w-full border p-2 rounded">
                            <option value="">Seleccione Facultad...</option>
                            <option th:each="f : ${facultades}" th:value="${f.id}" th:text="${f.nombre}"></option>
                        </select>
                        <button type="submit" class="bg-slate-700 text-white px-4 py-2 rounded">Filtrar</button>
                    </form>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4">Nombre</th>
                            <th class="p-4">Cédula</th>
                            <th class="p-4">Puntaje</th>
                            <th class="p-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="est : ${estudiantes}" class="border-b">
                            <td class="p-4" th:text="${est.primerNombre + ' ' + est.primerApellido}"></td>
                            <td class="p-4" th:text="${est.documento}"></td>
                            <td class="p-4" th:text="${est.resultado != null ? est.resultado.puntajeGlobal : 'N/A'}"></td>
                            <td class="p-4">
                                <a th:href="@{/docentes/informe-alumnos(documento=${est.documento})}" class="text-blue-600 hover:underline">Ver Informe</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
